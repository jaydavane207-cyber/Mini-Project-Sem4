<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GroupSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Make html/body/root transparent so the canvas aurora shows through on every page -->
    <style>
      html, body, #root {
        background: transparent !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      (function () {
        /* ════════════════════════════════════════
           GROUPSYNC — AURORA PARTICLE BACKGROUND
           ════════════════════════════════════════ */

        /* ── Canvas setup ── */
        const canvas = document.createElement('canvas');
        Object.assign(canvas.style, {
          position: 'fixed', top: '0', left: '0',
          width: '100%', height: '100%',
          zIndex: '0', pointerEvents: 'none',
        });
        document.body.appendChild(canvas);

        /* Lift React root above canvas */
        document.querySelectorAll('body > *:not(canvas)').forEach(el => {
          if (getComputedStyle(el).position === 'static') el.style.position = 'relative';
          if (!el.style.zIndex) el.style.zIndex = '1';
        });

        const ctx = canvas.getContext('2d');

        /* ── Resize ── */
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        /* ── Mouse ── */
        const mouse = { x: -9999, y: -9999 };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

        /* ── Click Ripples ── */
        const ripples = [];
        window.addEventListener('click', e => {
          ripples.push({ x: e.clientX, y: e.clientY, r: 0, alpha: 1 });
        });

        /* ── Color scheme ── */
        const htmlNode = document.documentElement;
        function checkDark() {
          if (htmlNode.classList.contains('theme-light')) return false;
          if (htmlNode.classList.contains('theme-dark')) return true;
          return window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        let isDark = checkDark();
        const observer = new MutationObserver(() => { isDark = checkDark(); });
        observer.observe(htmlNode, { attributes: true, attributeFilter: ['class'] });

        /* ── Neon palette ── */
        const NEON_DARK  = ['#00f0ff','#7b2fff','#ff2f8e','#00ffb3','#ffdd00','#ff6a00'];
        const NEON_LIGHT = ['#0ea5e9','#8b5cf6','#ec4899','#14b8a6','#f59e0b','#3b82f6'];

        /* ── Utility ── */
        function rand(a, b) { return Math.random() * (b - a) + a; }
        function randInt(a, b) { return Math.floor(rand(a, b + 1)); }

        /* ── Particles ── */
        const COUNT = Math.min(70, Math.floor(W * H / 15000));
        const particles = Array.from({ length: COUNT }, () => ({
          x: rand(0, W), y: rand(0, H),
          vx: rand(-0.4, 0.4), vy: rand(-0.4, 0.4),
          r: rand(1.5, 3.5),
          baseR: rand(1.5, 3.5),
          colorIdx: randInt(0, NEON_DARK.length - 1),
          pulseOffset: rand(0, Math.PI * 2),
        }));

        /* ── Shooting Stars ── */
        const stars = [];
        function spawnStar() {
          stars.push({
            x: rand(-50, W * 0.6), y: rand(-20, H * 0.5),
            vx: rand(4, 9), vy: rand(1.5, 3.5),
            len: rand(90, 170), alpha: 1,
          });
        }
        setInterval(spawnStar, 1400);

        /* ── Aurora Orbs ── */
        const orbs = [
          { x: W * 0.2,  y: H * 0.3,  vx:  0.12, vy:  0.07, r: Math.min(W, H) * 0.35, hue: 200 },
          { x: W * 0.75, y: H * 0.6,  vx: -0.10, vy:  0.08, r: Math.min(W, H) * 0.30, hue: 270 },
          { x: W * 0.5,  y: H * 0.85, vx:  0.08, vy: -0.09, r: Math.min(W, H) * 0.25, hue: 320 },
        ];

        let t = 0;

        /* ══════════════ MAIN DRAW LOOP ══════════════ */
        function draw() {
          t++;

          /* 1. Deep background gradient */
          if (isDark) {
            const bg = ctx.createLinearGradient(0, 0, W, H);
            bg.addColorStop(0,   '#05071a');
            bg.addColorStop(0.5, '#080d24');
            bg.addColorStop(1,   '#030712');
            ctx.fillStyle = bg;
          } else {
            const bg = ctx.createLinearGradient(0, 0, W, H);
            bg.addColorStop(0,   '#f4f7fe');
            bg.addColorStop(0.5, '#e2e8f0');
            bg.addColorStop(1,   '#f8fafc');
            ctx.fillStyle = bg;
          }
          ctx.globalAlpha = 1;
          ctx.fillRect(0, 0, W, H);

          /* 2. Aurora / nebula orbs */
          for (const orb of orbs) {
            orb.x += orb.vx; orb.y += orb.vy;
            orb.hue = (orb.hue + 0.1) % 360;
            if (orb.x < -orb.r) orb.x = W + orb.r;
            if (orb.x > W + orb.r) orb.x = -orb.r;
            if (orb.y < -orb.r) orb.y = H + orb.r;
            if (orb.y > H + orb.r) orb.y = -orb.r;
            const g = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.r);
            const alpha = isDark ? '0.08' : '0.22';
            g.addColorStop(0, `hsla(${orb.hue},${isDark ? '100%':'90%'},${isDark ? '65%':'75%'},${alpha})`);
            g.addColorStop(1, 'transparent');
            ctx.globalAlpha = 1;
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, W, H);
          }

          /* 3. Shooting stars */
          for (let i = stars.length - 1; i >= 0; i--) {
            const s = stars[i];
            s.x += s.vx; s.y += s.vy; s.alpha -= 0.013;
            if (s.alpha <= 0 || s.x > W + 100) { stars.splice(i, 1); continue; }
            const g = ctx.createLinearGradient(s.x, s.y, s.x - s.len, s.y - s.len * 0.4);
            g.addColorStop(0,   `rgba(255, 255, 255, ${s.alpha})`);
            g.addColorStop(0.4, `rgba(120, 200, 255, ${s.alpha * 0.6})`);
            g.addColorStop(1,   'transparent');
            ctx.globalAlpha = s.alpha;
            ctx.strokeStyle = g;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x - s.len, s.y - s.len * 0.38);
            ctx.stroke();
          }

          /* 4. Move particles + pulse */
          const palette = isDark ? NEON_DARK : NEON_LIGHT;
          for (const p of particles) {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0 || p.x > W) p.vx *= -1;
            if (p.y < 0 || p.y > H) p.vy *= -1;
            p.r = p.baseR + Math.sin(t * 0.04 + p.pulseOffset) * 0.9;
          }

          /* 5. Constellation lines */
          const MAX_D = 130;
          ctx.lineWidth = 0.8;
          for (let i = 0; i < COUNT; i++) {
            for (let j = i + 1; j < COUNT; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const d  = Math.sqrt(dx * dx + dy * dy);
              if (d < MAX_D) {
                ctx.globalAlpha = (1 - d / MAX_D) * (isDark ? 0.38 : 0.65);
                ctx.strokeStyle = palette[particles[i].colorIdx];
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
              }
            }
          }

          /* 6. Mouse web */
          ctx.lineWidth = 1.3;
          for (const p of particles) {
            const dx = p.x - mouse.x, dy = p.y - mouse.y;
            const d  = Math.sqrt(dx * dx + dy * dy);
            if (d < 200) {
              ctx.globalAlpha = (1 - d / 200) * 0.6;
              ctx.strokeStyle = isDark ? '#00f0ff' : '#5544ee';
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(mouse.x, mouse.y);
              ctx.stroke();
              p.x -= dx * 0.007;
              p.y -= dy * 0.007;
            }
          }

          /* 7. Neon glowing particles (Optimized double-draw instead of shadowBlur) */
          for (const p of particles) {
            const color = palette[p.colorIdx];
            // Outer glow layer
            ctx.globalAlpha = isDark ? 0.4 : 0.6;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner core layer
            ctx.globalAlpha = 1;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
          }

          /* 8. Click ripples (Optimized) */
          const ripColor = isDark ? '#00f0ff' : '#6644ff';
          for (let i = ripples.length - 1; i >= 0; i--) {
            const rp = ripples[i];
            rp.r += 6; rp.alpha -= 0.025;
            if (rp.alpha <= 0) { ripples.splice(i, 1); continue; }
            ctx.globalAlpha = rp.alpha;
            ctx.strokeStyle = ripColor;
            ctx.lineWidth   = 2;
            ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2); ctx.stroke();
            if (rp.r > 25) {
              ctx.globalAlpha = rp.alpha * 0.4;
              ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r * 0.6, 0, Math.PI * 2); ctx.stroke();
            }
          }
          ctx.globalAlpha = 1;

          requestAnimationFrame(draw);
        }

        draw();
      })();
    </script>
  </body>
</html>
